<div class="section">
  <div class="section-title">Practice Mode</div>

  <app-session-type-selector
    [selected]="settingsService.settings().sessionType"
    (selectedChange)="onSessionTypeChange($event)"
  >
  </app-session-type-selector>

  <div class="session-description">
    <span class="icon">
      {{ selectedSessionInfo().icon }}
    </span>

    <p>
      {{ selectedSessionInfo().description }}
    </p>
  </div>
</div>
