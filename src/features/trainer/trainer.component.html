<div class="card">
  <h1>SSC Speed Trainer</h1>

  <div class="status">Practice</div>

  @if (!questionService.currentQuestion()) {
    <button (click)="start()">▶ Start</button>
  } @else {
    <h2>
      {{ questionService.currentQuestion()?.question }}
    </h2>
  }

  <p>{{ settingsService.settings().mode }}</p>
</div>
